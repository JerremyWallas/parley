# For local development: docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
services:
  parley:
    build: ./server
    image: parley:dev
  nginx:
    build:
      context: .
      dockerfile: ./nginx/Dockerfile
    image: parley-nginx:dev
    volumes:
      - ./nginx/certs:/etc/nginx/certs
