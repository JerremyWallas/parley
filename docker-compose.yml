services:

  # Ollama — LLM for Cleanup/Rephrasing
  ollama:
    image: ollama/ollama
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ollama_data:/root/.ollama

  # Parley API — FastAPI + faster-whisper
  parley:
    image: ghcr.io/jerremywallas/parley:latest
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - OLLAMA_URL=http://ollama:11434
      - WHISPER_MODEL=${WHISPER_MODEL:-large-v3}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:7b}
      - LOG_LEVEL=info
      - DATA_DIR=/app/data
      - MODEL_DIR=/models
    depends_on:
      - ollama
    volumes:
      - whisper_models:/models
      - ./data:/app/data

  # Nginx Reverse Proxy — HTTPS + static files (PWA)
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-7800}:80"
      - "${HTTPS_PORT:-7443}:443"
    volumes:
      - ./web:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - parley

volumes:
  ollama_data:
  whisper_models:
