server {
    listen 80;
    server_name _;

    # Redirect HTTP to HTTPS
    location / {
        return 301 https://$host:7443$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # PWA static files
    root /usr/share/nginx/html;
    index index.html;

    # WebSocket proxy
    location /ws/ {
        proxy_pass http://parley:7800;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeout for streaming sessions (up to 30 min recordings)
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
    }

    # API proxy
    location /api/ {
        proxy_pass http://parley:7800;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Allow large audio uploads
        client_max_body_size 50m;

        # Timeout for transcription
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # PWA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|json|svg|png|ico)$ {
        expires 1h;
        add_header Cache-Control "public, immutable";
    }
}
